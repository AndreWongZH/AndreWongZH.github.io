<div style="padding-top: 20px" class="ui container ">

  <div class="ui stackable centered four cards">
    {% assign module_pages = site.pages | where: "type", "module" | sort: "date" | reverse %}
      {% for page in module_pages %}
        {% unless page.draft %}
          {% include module-card.html page=page %}
        {% endunless %}
      {% endfor %}
  </div>
</div>
